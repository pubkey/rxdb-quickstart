<!doctype html>
<html
    lang="en"
    data-framework="rxdb"
>

<head>
    <meta charset="utf-8">
    <title>RxDB Quickstart - OneDrive Sync</title>
</head>

<body>

    <span id="forkongithub">
        <a
            href="https://github.com/pubkey/rxdb-quickstart"
            target="_blank"
        >Fork me on GitHub</a>
    </span>

    <nav class="sync-nav">
        <span class="sync-nav-label">Sync method:</span>
        <a href="index.html" class="sync-nav-link">WebRTC</a>
        <a href="google-drive.html" class="sync-nav-link">Google Drive</a>
        <a href="onedrive.html" class="sync-nav-link active">OneDrive</a>
    </nav>

    <section class="todoapp">
        <header class="header">
            <h1>OneDrive todos</h1>
            <p class="description">
                This is a <a
                    href="https://rxdb.info/offline-first.html"
                    target="_blank"
                >local first</a> todo app that stores data locally with <a
                    href="https://rxdb.info/"
                    target="_blank"
                >RxDB</a> and
                replicates it to <a
                    href="https://rxdb.info/replication-microsoft-onedrive.html"
                    target="_blank"
                >Microsoft OneDrive</a> so your data syncs across all your devices.
            </p>
            <div class="cloud-login">
                <button id="onedrive-login-btn" class="login-btn login-btn-onedrive">
                    Sign in with Microsoft
                </button>
                <span id="login-status" class="login-status">Not connected</span>
            </div>
            <hr>
            <input
                id="insert-todo"
                class="new-todo"
                placeholder="What needs to be done? (Enter to submit)"
                autofocus
            >
        </header>
        <section class="main">
            <input
                id="toggle-all"
                class="toggle-all"
                type="checkbox"
            >
            <label for="toggle-all">Mark all as complete</label>
            <ul
                class="todo-list"
                id="todo-list"
            >

            </ul>
            <footer class="footer">
                <span class="todo-count"></span>
                <ul class="filters">
                </ul>
                <button
                    class="clear-completed"
                    id="clear-completed"
                >Clear completed</button>
            </footer>
        </section>
    </section>
    <footer class="info">
        <p>Written by <a
                href="https://github.com/pubkey"
                target="_blank"
            >Daniel</a></p>
        <p><a href="https://rxdb.info">Powered by RxDB</a></p>
    </footer>
</body>

</html>
